# Deep sleep — halves sleep after idle to save battery
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# RGB underglow (WS2812 LEDs on the back of the PCB)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_SPI=y

# Turn underglow off when USB is unplugged (saves battery on the wireless side)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
# Turn underglow off when keyboard goes idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Initial brightness 0-100 — keep low to avoid current spikes that crash BT
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40

# Bluetooth TX power (default is fine; uncomment one if you want more range / less draw)
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
