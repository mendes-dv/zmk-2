# Uncomment to enable deep sleep (saves battery — halves go to sleep after idle)
CONFIG_ZMK_SLEEP=y

# Idle timeout before sleep, in milliseconds (15 minutes)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Bluetooth connection power (default is fine; set to 0 for max range, -4 for lower draw)
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
