# Deep sleep — halves sleep after idle to save battery
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# RGB underglow — TEMPORARILY DISABLED while debugging.
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
# CONFIG_SPI=y
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40

# USB serial logging — temporary diagnostic.
# Makes the keyboard expose a /dev/cu.usbmodem* serial device on macOS
# even before key matrix / BT come up, so we can see boot logs.
CONFIG_ZMK_USB_LOGGING=y
